<!-- Moi the HTML deu co thuoc tinh display, tuy thuoc loai the ma no co gia tri inline hay block
Vi du the block co gia tri mac dinh display:block con inline co gia tri display:inline 
The <div>, <p>, <h1> toi <h6>, <ul>, <li>,v.v la cac the block
 - Dac tinh cua the block la tao ra 1 khoang trong o tren o duoi no, day cac phan tu khac xuong hang moi
 - Luon bat dau bang hang moi
 - Chieu ngang mac dinh thua huong 100% the cha chua no -->
 <!-- The inline dac diem la:
 - Khi nhieu the inline nam canh nhau thi chung se cung nam tren 1 hang
 - Chieu ngang cac the inline bang noi dung chua no
 - Khong the thiet lap cac width va height cho the inline   
 Vi du 1 so the inline: <span>, <a>, <strong>, <em> -->
    <!-- span la inline dung de boc 1 doan nho o trong dong con 
    div la block dung de boc 1 khoi noi dung  -->
<h1>hello</h1>  <h2>hi</h2> <p>Hom nay la 1 ngay dep troi</p>   <!-- The h1 la the block co display: block    -->
<ul>
    <li>1</li>
    <li>2</li>
    <li>3</li>
</ul>
<p style="color: red;">Toi la <span style="color: blue;" >Khanh</span></p>
